<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= , initial-scale=1.0">
    <title>grid practice</title>
</head>
<body>
    <diV style="
    display: grid;
    grid-template-columns: 100px 100px 200px;
    margin-bottom: 30px;
    ">
        <div style="background-color: lightblue;">1</div>
        <div style="background-color: lightgreen;">2</div>
        <div style="background-color: lightblue;">3</div>
    </diV>
    <diV style="
    display: grid;
    grid-template-columns: 100px 100px;
    ">
        <div style="background-color: lightblue;">1</div>
        <div style="background-color: lightgreen;">2</div>
    </diV>
    <diV style="
    display: grid;
    grid-template-columns: 100px  1fr ;
    margin-top: 30px;
    ">
        <div style="background-color: lightblue;">1</div>
        <div style="background-color: lightgreen;">2</div>
    </diV>
    <diV style="
    display: grid;
    grid-template-columns: 100px 1fr 1fr;
    margin-top: 30px;
    ">
        <div style="background-color: lightblue;">1</div>
        <div style="background-color: lightgreen;">2</div>
        <div style="background-color: lightblue;">3</div>
    </diV>
    <diV style="
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    margin-top: 30px;
     height: 200px;
     column-gap: 19px;
     row-gap: 19px;
    ">
        <div style="background-color: lightblue;">1</div>
        <div style="background-color: lightgreen;">2</div>
        <div style="background-color: lightblue;">3</div>
        <div style="background-color: rgb(224, 230, 173);">1</div>
        <div style="background-color: lightgreen;">2</div>
        <div style="background-color: lightblue;">3</div>
    </diV>
</body>

</html>
