<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<!-- get is not used because it is insecure 
  it is only used for search boxes or for navigation purposes  -->

<body>
  <form action="action_page.php" method="post">
    <div>
      <label for="fname">first name</label>
      <input type="text" id="fname" name="fname" placeholder="type here" required>
    </div>
    <br>
    <div>
      <label for="lname">last name</label>
      <input type="text" id="lname" name="lname" placeholder="type here" required>
    </div>
    <br>
    <div>
      <label for="pass">password</label>
      <input type="password" id="pass" name="pass" placeholder="type here" required maxlength="10" required>
    </div>
    <br>
    <div>
      <label for="email">email</label>
      <input type="email" id="email" name="email" placeholder="type here" required>
    </div>
    <br>
    <div>
      <label for="phone">phone</label>
      <input type="tel" id="phone" name="phone" placeholder="type here" required>
    </div>
    <br>
    <div>
      <label for="date">date</label>
      <input type="date" id="date" name="date" placeholder="type here" required>
    </div>
    <br>
    <div>
      <label for="quantity">quantity</label>
      <input type="number" id="quantity" name="quantity" placeholder="type here" min="0" max="99" value="1" required>
    </div>
    <br>
    <div>
      <label for="title">title</label>

      <label for="Mr">Mr</label>
      <input type="radio" id="Mr" name="title" value="Mr">

      <label for="Mrs">Mrs</label>
      <input type="radio" id="Mrs" name="title" value="Mrs">

      <label for="Phd">Phd</label>
      <input type="radio" id="Phd" name="title" value="Phd">
    </div>

    <br>
    <div>
      <label for="payments">payments</label>
      <select id="payments" name="payments">
        <option value="visa">visa</option>
        <option value="giftcard">giftcard</option>
        <option value="mastercard">mastercard</option>
      </select>
    </div>

    <br>
    <div>
      <label for="subscribe">subscribe</label>
      <input type="checkbox" id="subscribe" name="subscribe" placeholder="type here" required>
    </div>

    <br>
    <div>
      <input type="reset">
    </div>

    <br>
    <div>
      <input type="submit">
    </div>
  </form>
</body>

</html>
