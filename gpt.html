<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Smooth Button Design</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0f172a;
      font-family: Arial, sans-serif;
      gap: 20px;
    }

    /* Base button style */
    .btn {
      position: relative;
      padding: 12px 28px;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    /* Button 1 - Gradient Glow */
    .btn-glow {
      background: linear-gradient(45deg, #6366f1, #22c55e);
    }

    .btn-glow:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-glow:active {
      transform: scale(0.95);
    }

    /* Button 2 - Slide Effect */
    .btn-slide {
      background: #1e293b;
    }

    .btn-slide::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: #22c55e;
      transition: all 0.4s ease;
      z-index: 0;
    }

    .btn-slide:hover::before {
      left: 0;
    }

    .btn-slide span {
      position: relative;
      z-index: 1;
    }

    /* Button 3 - Outline Fill */
    .btn-outline {
      background: transparent;
      border: 2px solid #6366f1;
      color: #6366f1;
    }

    .btn-outline:hover {
      background: #6366f1;
      color: #fff;
      
    }

    .btn-outline:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <button class="btn btn-glow">Glow Button</button>

  <button title="helooo" class="btn btn-slide"><span>Slide Button</span></button>

  <button class="btn btn-outline">Outline Button</button>

</body>

</html>
